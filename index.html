<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="高教活動觀測站 — 台灣 27 所高等教育機構活動情報儀表板，涵蓋 112–114 學年度">
<title>高教活動觀測站</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234338CA'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-family='serif' font-weight='bold'>E</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root,html[data-theme="light"]{
  --base:#FAF8F5;--card:#FFFFFF;--elevated:#F3F0EB;--accent:#6366F1;--accent2:#F59E0B;
  --warm:#B45309;--text:#1C1917;--text2:#57534E;--muted:#78716C;--border:#E7E5E4;
  --shadow:rgba(28,25,23,0.06);--hover:rgba(67,56,202,0.06);
  --chart-bg:rgba(255,255,255,0.8);--grid:rgba(0,0,0,0.06)
}
html[data-theme="dark"]{
  --base:#1C1917;--card:#292524;--elevated:#3D3836;--accent:#818CF8;--accent2:#FBBF24;
  --warm:#F59E0B;--text:#FAFAF9;--text2:#D6D3D1;--muted:#78716C;--border:#44403C;
  --shadow:rgba(0,0,0,0.3);--hover:rgba(129,140,248,0.08);
  --chart-bg:rgba(41,37,36,0.8);--grid:rgba(255,255,255,0.08)
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--base);color:var(--text);font-family:'DM Sans','Noto Sans TC',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.6}
h1,h2,h3,h4{font-family:'Instrument Serif','Noto Sans TC',serif;font-weight:400;letter-spacing:-0.01em}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text2)}

/* Card system */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 1px 3px var(--shadow),0 4px 16px var(--shadow);transition:all .25s ease}
.card:hover{box-shadow:0 2px 8px var(--shadow),0 8px 32px var(--shadow);transform:translateY(-1px)}
.card-flat{background:var(--card);border:1px solid var(--border);border-radius:12px}

/* Grain overlay */
body::before{content:'';position:fixed;inset:0;opacity:0.03;pointer-events:none;z-index:9999;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* Stat number */
.stat-num{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--accent);line-height:1}

/* Tabs */
.tab-pill{position:relative;padding:8px 20px;border-radius:100px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;border:none;background:transparent;color:var(--text2);font-family:'DM Sans','Noto Sans TC',sans-serif}
.tab-pill:hover{background:var(--hover);color:var(--text)}
.tab-pill.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(67,56,202,0.25)}
html[data-theme="dark"] .tab-pill.active{box-shadow:0 2px 8px rgba(129,140,248,0.25)}

/* Forms */
input,select{background:var(--base);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 14px;font-family:'DM Sans','Noto Sans TC',sans-serif;font-size:14px;outline:none;transition:all .2s}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,56,202,0.1)}
html[data-theme="dark"] input:focus,html[data-theme="dark"] select:focus{box-shadow:0 0 0 3px rgba(129,140,248,0.15)}

/* Buttons */
.btn{padding:10px 20px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(67,56,202,0.3)}
.btn-secondary{background:var(--elevated);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}

/* Table */
table{width:100%;border-collapse:separate;border-spacing:0}
th{text-align:left;padding:12px 16px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);border-bottom:2px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;font-family:'DM Sans',sans-serif}
th:hover{color:var(--accent)}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--hover)}

/* Confidence indicators */
.conf-high{border-left:3px solid #16A34A}.conf-medium{border-left:3px solid #CA8A04}.conf-unverified{border-left:3px solid var(--muted);opacity:0.75}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500;gap:4px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.anim-fade{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
.anim-fade-1{animation-delay:.05s}.anim-fade-2{animation-delay:.1s}.anim-fade-3{animation-delay:.15s}.anim-fade-4{animation-delay:.2s}

/* Decorative line */
.deco-line{width:40px;height:3px;background:var(--accent);border-radius:2px;margin-bottom:16px}

/* Heatmap cell */
.heat-cell{display:flex;align-items:center;justify-content:center;font-size:12px;font-family:'JetBrains Mono',monospace;border-radius:6px;min-width:36px;height:32px;font-weight:500}

/* Mobile card layout for table rows */
.mobile-card{display:none}
.desktop-table{display:block}

@media (max-width:640px){
  .tab-pill{padding:6px 12px;font-size:12px}
  h1{font-size:1.15rem!important}
  h2{font-size:1.4rem!important}
  .card,.card-flat{border-radius:12px}
  main{padding-left:12px!important;padding-right:12px!important}
  .stat-num{font-size:1.8rem!important}
  .mobile-card{display:block}
  .desktop-table{display:none}
  .mobile-event{padding:14px;border-bottom:1px solid var(--border)}
  .mobile-event:last-child{border-bottom:none}
  /* Tighter header */
  header{padding:10px 12px!important}
  nav{padding:8px 12px!important}
}
@media (min-width:641px) and (max-width:1023px){
  main{padding-left:16px!important;padding-right:16px!important}
}
@media print{body{background:#fff;color:#000}.card{border:1px solid #ddd;box-shadow:none}body::before{display:none}}
</style>
</head>
<body>
<div id="root" style="min-height:100vh;display:flex;align-items:center;justify-content:center">
<div style="text-align:center">
<div style="width:36px;height:36px;border:3px solid var(--accent);border-top-color:transparent;border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite"></div>
<div style="font-family:'Instrument Serif',serif;color:var(--accent);font-size:20px">載入中...</div>
</div>
</div>

<script src="hei-event-data.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script>
tailwind.config={theme:{extend:{colors:{
  base:'var(--base)',card:'var(--card)',elevated:'var(--elevated)',
  accent:'var(--accent)',accent2:'var(--accent2)',warm:'var(--warm)',
  txt:'var(--text)',txt2:'var(--text2)',muted:'var(--muted)'
},fontFamily:{
  serif:['Instrument Serif','Noto Sans TC','serif'],
  sans:['DM Sans','Noto Sans TC','sans-serif'],
  mono:['JetBrains Mono','monospace']
}}}}
</script>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback,memo}=React;

// ── Data ──
const DATA=(typeof __EVENTS_DATA__==='string')?JSON.parse(__EVENTS_DATA__):__EVENTS_DATA__;
const {meta,schools,events,category_map}=DATA;

// ── Academic Year Context ──
const YearCtx=React.createContext('all');
const useYear=()=>React.useContext(YearCtx);
const filterEvts=(year)=>year==='all'?events:events.filter(e=>e.academic_year===year);

// ── Utilities ──
const catColor=(cat)=>category_map[cat]?.color||'#78716C';
const catName=(cat)=>category_map[cat]?.name||'其他';
const schoolType=(id)=>schools.find(s=>s.id===id)?.type||'public';
const schoolName=(id)=>schools.find(s=>s.id===id)?.name||id;
const fmtDate=(d)=>{if(!d)return'-';const p=d.split('-');return `${p[0]}/${p[1]}/${p[2]}`;};
const monthKey=(d)=>d?d.slice(0,7):'';

// ── Theme ──
function useTheme(){
  const[t,setT]=useState(()=>localStorage.getItem('hei-theme')||'light');
  const toggle=useCallback(()=>{
    const n=t==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',n);
    localStorage.setItem('hei-theme',n);
    setT(n);
  },[t]);
  useEffect(()=>{document.documentElement.setAttribute('data-theme',t);},[]);
  return[t,toggle];
}

// ── Chart Hook ──
function useChart(ref,configFn,deps=[]){
  const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(inst.current)inst.current.destroy();
    const theme=document.documentElement.getAttribute('data-theme');
    inst.current=new Chart(ref.current,configFn(theme));
    return()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },deps);
}

// ── Shared chart defaults ──
const chartColors=['#6366F1','#F59E0B','#10B981','#F472B6','#06B6D4','#8B5CF6','#EF4444','#14B8A6','#EC4899','#3B82F6','#A855F7','#F97316','#22D3EE'];
const chartFont={family:"'DM Sans','Noto Sans TC',sans-serif"};
const chartOpts=(theme)=>({
  gridColor:theme==='dark'?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)',
  tickColor:theme==='dark'?'#D6D3D1':'#57534E',
  legendColor:theme==='dark'?'#D6D3D1':'#57534E',
});

// ── Stat Card ──
const StatCard=memo(({label,value,sub,delay=0})=>(
  <div className={`card p-6 anim-fade anim-fade-${delay}`}>
    <div className="text-sm font-medium mb-1" style={{color:'var(--text2)'}}>{label}</div>
    <div className="stat-num text-4xl mb-2">{value}</div>
    {sub&&<div className="text-xs" style={{color:'var(--muted)'}}>{sub}</div>}
  </div>
));

// ── Section Header ──
const SectionHead=({title,sub})=>(
  <div className="mb-4">
    <div className="deco-line"></div>
    <h2 className="text-2xl" style={{fontFamily:"'Instrument Serif',serif"}}>{title}</h2>
    {sub&&<p className="text-sm mt-1" style={{color:'var(--text2)'}}>{sub}</p>}
  </div>
);

// ════════════ TAB 1: OVERVIEW ════════════
function OverviewTab(){
  const pieRef=useRef(null);
  const barRef=useRef(null);
  const lineRef=useRef(null);
  const[theme]=useTheme();
  const year=useYear();
  const evts=useMemo(()=>filterEvts(year),[year]);

  const catDist=useMemo(()=>{
    const m={};evts.forEach(e=>{m[e.category]=(m[e.category]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[evts]);

  const schoolRank=useMemo(()=>{
    const m={};evts.forEach(e=>{m[e.school_id]=(m[e.school_id]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,15);
  },[evts]);

  const monthly=useMemo(()=>{
    const m={};evts.forEach(e=>{const k=monthKey(e.date);if(k)m[k]=(m[k]||0)+1;});
    return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
  },[evts]);

  const now=new Date();
  const thisMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const thisMonthCount=evts.filter(e=>monthKey(e.date)===thisMonth).length;
  const catCount=new Set(evts.map(e=>e.category)).size;

  useChart(pieRef,(th)=>{
    const o=chartOpts(th);
    return{type:'doughnut',data:{
      labels:catDist.map(([c])=>catName(c)),
      datasets:[{data:catDist.map(([,v])=>v),backgroundColor:catDist.map(([c])=>catColor(c)),borderWidth:0,hoverOffset:8}]
    },options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{color:o.legendColor,font:{...chartFont,size:12},padding:10,usePointStyle:true,pointStyleWidth:8}}}}}
  },[theme,catDist]);

  useChart(barRef,(th)=>{
    const o=chartOpts(th);
    const pubColor=th==='dark'?'#818CF8':'#6366F1';
    const priColor=th==='dark'?'#FBBF24':'#F59E0B';
    return{type:'bar',data:{
      labels:schoolRank.map(([id])=>schools.find(s=>s.id===id)?.acronym||id),
      datasets:[{data:schoolRank.map(([,v])=>v),backgroundColor:schoolRank.map(([id])=>schoolType(id)==='public'?pubColor:priColor),borderRadius:6,barThickness:14,categoryPercentage:0.7,barPercentage:0.75}]
    },options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{color:o.gridColor},ticks:{color:o.tickColor,font:chartFont}},y:{grid:{display:false},ticks:{color:o.tickColor,font:{...chartFont,size:12}}}}}}
  },[theme,schoolRank]);

  useChart(lineRef,(th)=>{
    const o=chartOpts(th);
    const lineColor=th==='dark'?'#818CF8':'#6366F1';
    return{type:'line',data:{
      labels:monthly.map(([k])=>k),
      datasets:[{data:monthly.map(([,v])=>v),borderColor:lineColor,backgroundColor:lineColor+'18',fill:true,tension:0.4,pointRadius:5,pointBackgroundColor:lineColor,pointBorderColor:th==='dark'?'#292524':'#fff',pointBorderWidth:2}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:o.gridColor},ticks:{color:o.tickColor,font:{...chartFont,size:11}}},y:{grid:{color:o.gridColor},ticks:{color:o.tickColor,font:{family:'JetBrains Mono',size:11}},beginAtZero:true}}}}
  },[theme,monthly]);

  return(
    <div className="anim-fade">
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-5 mb-6 sm:mb-8">
        <StatCard label="活動總數" value={evts.length} sub={year==='all'?`${meta.date_range.start} ~ ${meta.date_range.end}`:`${year} 學年度`} delay={1}/>
        <StatCard label="學校數" value={meta.schools_crawled} sub={`${schools.filter(s=>s.type==='public').length} 國立 / ${schools.filter(s=>s.type==='private').length} 私立`} delay={2}/>
        <StatCard label="活動類別" value={catCount} sub="資料驅動分類" delay={3}/>
        <StatCard label="本月活動" value={thisMonthCount} sub={thisMonth} delay={4}/>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div className="card p-6">
          <SectionHead title="類別分布"/>
          <div style={{height:300}}><canvas ref={pieRef}></canvas></div>
        </div>
        <div className="card p-6">
          <SectionHead title="學校排名" sub="依活動數前 15 名"/>
          <div style={{height:300}}><canvas ref={barRef}></canvas></div>
        </div>
      </div>
      <div className="card p-6">
        <SectionHead title="月度時間軸"/>
        <div style={{height:220}}><canvas ref={lineRef}></canvas></div>
      </div>
    </div>
  );
}

// ════════════ TAB 2: EVENT BROWSER ════════════
function EventBrowserTab(){
  const year=useYear();
  const evts=useMemo(()=>filterEvts(year),[year]);
  const[search,setSearch]=useState('');
  const[catFilter,setCatFilter]=useState('all');
  const[schoolFilter,setSchoolFilter]=useState('all');
  const[typeFilter,setTypeFilter]=useState('all');
  const[sortCol,setSortCol]=useState('date');
  const[sortDir,setSortDir]=useState('desc');
  const[page,setPage]=useState(1);
  const perPage=20;

  const filtered=useMemo(()=>{
    let r=evts;
    if(search){const q=search.toLowerCase();r=r.filter(e=>e.title.toLowerCase().includes(q)||e.school_name.includes(q)||e.unit.includes(q));}
    if(catFilter!=='all')r=r.filter(e=>e.category===catFilter);
    if(schoolFilter!=='all')r=r.filter(e=>e.school_id===schoolFilter);
    if(typeFilter!=='all')r=r.filter(e=>schoolType(e.school_id)===typeFilter);
    r=[...r].sort((a,b)=>{
      let va=a[sortCol]||'',vb=b[sortCol]||'';
      if(sortCol==='date'){va=va||'9999';vb=vb||'9999';}
      return sortDir==='asc'?(va<vb?-1:va>vb?1:0):(va>vb?-1:va<vb?1:0);
    });
    return r;
  },[search,catFilter,schoolFilter,typeFilter,sortCol,sortDir]);

  const totalPages=Math.max(1,Math.ceil(filtered.length/perPage));
  const pageEvents=filtered.slice((page-1)*perPage,page*perPage);
  useEffect(()=>{setPage(1);},[search,catFilter,schoolFilter,typeFilter,year]);

  const doSort=(col)=>{if(sortCol===col)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortCol(col);setSortDir('asc');}};
  const sortIcon=(col)=>sortCol===col?(sortDir==='asc'?' \u25B2':' \u25BC'):'';

  return(
    <div className="anim-fade">
      <div className="card-flat p-4 mb-5">
        <div className="flex flex-wrap gap-3 items-center">
          <input className="w-full sm:flex-1 sm:min-w-[200px]" placeholder="搜尋活動、學校、系所..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}>
            <option value="all">全部類別</option>
            {Object.entries(category_map).map(([k,v])=><option key={k} value={k}>{v.name}</option>)}
          </select>
          <select value={schoolFilter} onChange={e=>setSchoolFilter(e.target.value)}>
            <option value="all">全部學校</option>
            {schools.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}>
            <option value="all">國立 + 私立</option>
            <option value="public">僅國立</option>
            <option value="private">僅私立</option>
          </select>
          <span className="text-sm font-mono font-medium" style={{color:'var(--accent)'}}>{filtered.length} 筆</span>
        </div>
      </div>
      {/* Desktop table */}
      <div className="card-flat desktop-table overflow-x-auto">
        <table>
          <thead>
            <tr>
              <th onClick={()=>doSort('date')}>日期{sortIcon('date')}</th>
              <th onClick={()=>doSort('school_name')}>學校{sortIcon('school_name')}</th>
              <th onClick={()=>doSort('category')}>類別{sortIcon('category')}</th>
              <th onClick={()=>doSort('title')}>標題{sortIcon('title')}</th>
              <th>系所</th>
              <th>連結</th>
              <th>可信度</th>
            </tr>
          </thead>
          <tbody>
            {pageEvents.map(e=>(
              <tr key={e.id} className={`conf-${e.confidence}`}>
                <td className="font-mono text-sm whitespace-nowrap">{fmtDate(e.date)}</td>
                <td className="whitespace-nowrap font-medium">{e.school_name}</td>
                <td><span className="badge" style={{background:`${catColor(e.category)}15`,color:catColor(e.category)}}><span style={{width:6,height:6,borderRadius:'50%',background:catColor(e.category),display:'inline-block'}}></span>{catName(e.category)}</span></td>
                <td className="min-w-[280px]">{e.title}</td>
                <td className="text-sm" style={{color:'var(--text2)'}}>{e.unit}</td>
                <td>{e.url?<a href={e.url} target="_blank" rel="noopener noreferrer" className="text-sm font-medium" style={{color:'var(--accent)',textDecoration:'underline',textUnderlineOffset:'3px'}}>開啟</a>:<span className="text-xs" style={{color:'var(--muted)'}}>無</span>}</td>
                <td><span className="badge text-xs" style={{background:e.confidence==='high'?'#DCFCE7':e.confidence==='medium'?'#FEF3C7':'#F5F5F4',color:e.confidence==='high'?'#166534':e.confidence==='medium'?'#854D0E':'#78716C'}}>{e.confidence}</span></td>
              </tr>
            ))}
            {pageEvents.length===0&&<tr><td colSpan={7} className="text-center py-10" style={{color:'var(--muted)'}}>查無活動</td></tr>}
          </tbody>
        </table>
      </div>

      {/* Mobile card list */}
      <div className="card-flat mobile-card">
        {pageEvents.map(e=>(
          <div key={e.id} className="mobile-event">
            <div className="flex items-start justify-between gap-2 mb-2">
              <span className="badge text-xs" style={{background:`${catColor(e.category)}15`,color:catColor(e.category),flexShrink:0}}>{catName(e.category)}</span>
              <span className="font-mono text-xs" style={{color:'var(--text2)',flexShrink:0}}>{fmtDate(e.date)}</span>
            </div>
            <div className="font-medium text-sm leading-snug mb-1.5">{e.url?<a href={e.url} target="_blank" rel="noopener noreferrer" style={{color:'var(--text)'}}>{e.title}</a>:e.title}</div>
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-xs font-medium" style={{color:'var(--accent)'}}>{e.school_name}</span>
              <span className="text-xs" style={{color:'var(--muted)'}}>{e.unit}</span>
              <span className="badge text-xs" style={{background:e.confidence==='high'?'#DCFCE7':e.confidence==='medium'?'#FEF3C7':'#F5F5F4',color:e.confidence==='high'?'#166534':e.confidence==='medium'?'#854D0E':'#78716C'}}>{e.confidence}</span>
            </div>
          </div>
        ))}
        {pageEvents.length===0&&<div className="text-center py-10" style={{color:'var(--muted)'}}>查無活動</div>}
      </div>

      {/* Pagination — shared */}
      {totalPages>1&&(
        <div className="card-flat mt-0 flex items-center justify-between p-3 sm:p-4" style={{borderTop:'1px solid var(--border)',borderTopLeftRadius:0,borderTopRightRadius:0}}>
          <button className="btn btn-secondary text-sm" disabled={page<=1} onClick={()=>setPage(p=>p-1)} style={{opacity:page<=1?0.4:1}}>上一頁</button>
          <span className="text-sm font-mono" style={{color:'var(--text2)'}}>{page} / {totalPages}</span>
          <button className="btn btn-secondary text-sm" disabled={page>=totalPages} onClick={()=>setPage(p=>p+1)} style={{opacity:page>=totalPages?0.4:1}}>下一頁</button>
        </div>
      )}
    </div>
  );
}

// ════════════ TAB 3: ANALYSIS ════════════
function AnalysisTab(){
  const trendRef=useRef(null);
  const compareRef=useRef(null);
  const[theme]=useTheme();
  const year=useYear();
  const evts=useMemo(()=>filterEvts(year),[year]);

  const topSchools=useMemo(()=>{
    const m={};evts.forEach(e=>{m[e.school_id]=(m[e.school_id]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([id])=>id);
  },[evts]);
  const cats=Object.keys(category_map);
  const heatData=useMemo(()=>{
    const m={};evts.forEach(e=>{const k=`${e.school_id}-${e.category}`;m[k]=(m[k]||0)+1;});
    return m;
  },[evts]);
  const heatMax=Math.max(1,...Object.values(heatData));

  const monthlyByCat=useMemo(()=>{
    const months=new Set();const m={};
    evts.forEach(e=>{const mk=monthKey(e.date);if(!mk)return;months.add(mk);const k=`${e.category}-${mk}`;m[k]=(m[k]||0)+1;});
    return{months:[...months].sort(),data:m};
  },[evts]);

  const keywords=useMemo(()=>{
    const stops=new Set([
      // 中文通用停用詞
      '的','與','及','在','之','了','和','為','是','中','大','全','年','月','日','上','下','或','對','由','將',
      // 中文學術/活動噪音
      '大學','國立','私立','活動','學','系','院','處','室','所','會','講座','研討','工作坊','論壇',
      '成果','發表','中心','學系','辦理','計畫','教育','國際','台灣','技術','演講','專題','學術',
      '邀請','學年度','學年度第','學期','系列','研究所','學程','大講堂','座談','說明',
      '第一屆','第二屆','第三屆','第四屆','第五屆','研討會','論文','發表會','年會',
      '特別演講','公開演講','學術演講','專題演講',
      // 英文停用詞
      'and','or','of','in','for','the','on','at','to','a','an','is','are','be','was','were',
      'with','from','by','The','In','Of','And','For','On','A','An','To','By','From','With',
      // 英文學術噪音
      'University','National','International','Conference','Seminar','Symposium','Workshop',
      'Dr','Prof','Mr','Ms','PhD','Professor','Speaker','Lecture','Forum','Talk','Event',
      'Taiwan','Annual','Research','Science','Studies',
      'SEED',
    ]);
    const isAscii=w=>/^[A-Za-z]/.test(w);
    const m={};
    evts.forEach(e=>{
      const words=e.title
        .replace(/[，。、：；「」（）《》【】\[\]\s\d\-\/\.\,\!\?\:\#\@\&\*]/g,' ')
        .split(/\s+/)
        .filter(w=>{
          if(!w||stops.has(w))return false;
          if(isAscii(w))return w.length>=4;
          return w.length>=2;
        });
      words.forEach(w=>{m[w]=(m[w]||0)+1;});
    });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,50);
  },[evts]);

  const pvp=useMemo(()=>{
    const pub={},pri={};
    evts.forEach(e=>{const target=schoolType(e.school_id)==='public'?pub:pri;target[e.category]=(target[e.category]||0)+1;});
    return{pub,pri};
  },[evts]);

  const top5Cats=useMemo(()=>{
    const m={};evts.forEach(e=>{m[e.category]=(m[e.category]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([c])=>c);
  },[evts]);

  useChart(trendRef,(th)=>{
    const o=chartOpts(th);
    return{type:'line',data:{
      labels:monthlyByCat.months,
      datasets:top5Cats.map((c,i)=>({
        label:catName(c),data:monthlyByCat.months.map(mk=>monthlyByCat.data[`${c}-${mk}`]||0),
        borderColor:catColor(c),backgroundColor:catColor(c)+'15',tension:0.4,pointRadius:4,borderWidth:2.5
      }))
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:o.legendColor,font:{...chartFont,size:11},usePointStyle:true}}},scales:{x:{grid:{color:o.gridColor},ticks:{color:o.tickColor,font:{...chartFont,size:10},maxTicksLimit:18}},y:{grid:{color:o.gridColor},ticks:{color:o.tickColor,font:{family:'JetBrains Mono',size:11}},beginAtZero:true}}}}
  },[theme,monthlyByCat,top5Cats]);

  // Sort categories by total for the bar chart
  const sortedCats=useMemo(()=>{
    const totals=cats.map(c=>({c,total:(pvp.pub[c]||0)+(pvp.pri[c]||0)}));
    return totals.sort((a,b)=>b.total-a.total).map(x=>x.c);
  },[]);

  useChart(compareRef,(th)=>{
    const o=chartOpts(th);
    const pubC=th==='dark'?'#818CF8':'#6366F1';
    const priC=th==='dark'?'#FBBF24':'#F59E0B';
    return{type:'bar',data:{
      labels:sortedCats.map(c=>catName(c)),
      datasets:[
        {label:'國立',data:sortedCats.map(c=>pvp.pub[c]||0),backgroundColor:pubC,borderRadius:4,barPercentage:0.75},
        {label:'私立',data:sortedCats.map(c=>pvp.pri[c]||0),backgroundColor:priC,borderRadius:4,barPercentage:0.75}
      ]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:o.legendColor,font:chartFont}}},scales:{x:{grid:{display:false},ticks:{color:o.tickColor,font:{...chartFont,size:10},maxRotation:45}},y:{grid:{color:o.gridColor},ticks:{color:o.tickColor,font:{family:'JetBrains Mono',size:11}},beginAtZero:true}}}}
  },[theme,pvp,sortedCats]);

  return(
    <div className="anim-fade">
      <div className="card p-6 mb-6 overflow-x-auto">
        <SectionHead title="類別 × 學校熱力圖" sub="依活動數前 15 所學校"/>
        <div style={{minWidth:700}}>
          <div className="flex items-center" style={{marginBottom:4}}>
            <div style={{width:90}}></div>
            {cats.map(c=><div key={c} className="flex-1 text-center text-xs font-medium px-0.5" style={{color:'var(--text2)',minWidth:36}}>{catName(c).slice(0,3)}</div>)}
          </div>
          {topSchools.map(sid=>(
            <div key={sid} className="flex items-center" style={{marginBottom:3}}>
              <div className="text-xs font-medium truncate" style={{width:90,color:'var(--text2)'}}>{schools.find(s=>s.id===sid)?.acronym||sid}</div>
              {cats.map(c=>{
                const v=heatData[`${sid}-${c}`]||0;
                const intensity=v/heatMax;
                return <div key={c} className="flex-1 px-0.5"><div className="heat-cell" style={{background:v?`${catColor(c)}${Math.round(intensity*180+40).toString(16).padStart(2,'0')}`:'transparent',color:intensity>0.4?'#fff':'var(--text2)'}}>{v||''}</div></div>;
              })}
            </div>
          ))}
        </div>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div className="card p-6">
          <SectionHead title="月度趨勢" sub="前 5 大類別"/>
          <div style={{height:280}}><canvas ref={trendRef}></canvas></div>
        </div>
        <div className="card p-6">
          <SectionHead title="國立 vs 私立"/>
          <div style={{height:280}}><canvas ref={compareRef}></canvas></div>
        </div>
      </div>
      <div className="card p-6">
        <SectionHead title="熱門關鍵字" sub="依出現頻率，字體越大代表越常見"/>
        {(()=>{
          const wColors=['#8B5CF6','#3B82F6','#EC4899','#F59E0B','#10B981','#6366F1','#F97316','#06B6D4','#22C55E','#EF4444','#A855F7','#14B8A6'];
          const maxC=keywords[0]?.[1]||1;
          const minC=keywords[keywords.length-1]?.[1]||1;
          return(
            <div style={{lineHeight:2.4,padding:'4px 0'}}>
              {keywords.map(([w,c],i)=>{
                const ratio=(c-minC)/Math.max(1,maxC-minC);
                const size=Math.round(12+ratio*26);
                const color=wColors[i%wColors.length];
                const weight=ratio>0.6?700:ratio>0.3?600:400;
                return(
                  <span key={w} style={{
                    fontSize:size,color,fontWeight:weight,
                    margin:'0 6px',display:'inline-block',
                    opacity:0.65+ratio*0.35,lineHeight:1.2,
                    transition:'all .15s',cursor:'default',
                    fontFamily:"'DM Sans','Noto Sans TC',sans-serif"
                  }}
                  onMouseEnter={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.transform='scale(1.12)';}}
                  onMouseLeave={e=>{e.currentTarget.style.opacity=String(0.65+ratio*0.35);e.currentTarget.style.transform='scale(1)';}}>
                    {w}
                  </span>
                );
              })}
            </div>
          );
        })()}
      </div>
    </div>
  );
}

// ════════════ TAB 4: SCHOOL PROFILE ════════════
function SchoolProfileTab(){
  const[selected,setSelected]=useState('');
  const[compare,setCompare]=useState([]);
  const polarRef=useRef(null);
  const[theme]=useTheme();
  const year=useYear();
  const evts=useMemo(()=>filterEvts(year),[year]);

  const schoolEvents=useMemo(()=>selected?evts.filter(e=>e.school_id===selected):[],[selected,evts]);
  const schoolCatDist=useMemo(()=>{
    const m={};schoolEvents.forEach(e=>{m[e.category]=(m[e.category]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[schoolEvents]);

  const compSchools=useMemo(()=>compare.length>0?compare:schools.slice(0,5).map(s=>s.id),[compare]);
  const cats=Object.keys(category_map);

  // Grouped bar chart instead of radar — much clearer for this data
  const barCompRef=useRef(null);
  useChart(barCompRef,(th)=>{
    const o=chartOpts(th);
    const topCats=(() => {
      const totals={};
      compSchools.forEach(sid=>{
        evts.filter(e=>e.school_id===sid).forEach(e=>{totals[e.category]=(totals[e.category]||0)+1;});
      });
      return Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,7).map(([c])=>c);
    })();
    return{type:'bar',data:{
      labels:topCats.map(c=>catName(c)),
      datasets:compSchools.map((sid,i)=>{
        const sEvts=evts.filter(e=>e.school_id===sid);
        return{
          label:schools.find(s=>s.id===sid)?.acronym||sid,
          data:topCats.map(c=>sEvts.filter(e=>e.category===c).length),
          backgroundColor:chartColors[i%chartColors.length],borderRadius:4
        };
      })
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:o.legendColor,font:{...chartFont,size:11}}}},scales:{x:{grid:{display:false},ticks:{color:o.tickColor,font:{...chartFont,size:11}}},y:{grid:{color:o.gridColor},ticks:{color:o.tickColor,font:{family:'JetBrains Mono',size:11}},beginAtZero:true}}}}
  },[compSchools,theme,evts]);

  // Polar area for selected school
  useChart(polarRef,(th)=>{
    const o=chartOpts(th);
    if(!schoolCatDist.length) return{type:'polarArea',data:{labels:[],datasets:[{data:[]}]},options:{}};
    return{type:'polarArea',data:{
      labels:schoolCatDist.map(([c])=>catName(c)),
      datasets:[{data:schoolCatDist.map(([,v])=>v),backgroundColor:schoolCatDist.map(([c])=>catColor(c)+'B0'),borderWidth:0}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:o.legendColor,font:{...chartFont,size:11},usePointStyle:true}}},scales:{r:{grid:{color:o.gridColor},ticks:{display:false}}}}}
  },[selected,schoolCatDist,theme,evts]);

  const toggleCompare=(sid)=>{
    setCompare(prev=>{
      if(prev.includes(sid))return prev.filter(x=>x!==sid);
      if(prev.length>=6)return prev;
      return[...prev,sid];
    });
  };

  return(
    <div className="anim-fade">
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div className="card p-6">
          <SectionHead title="選擇學校"/>
          <select className="w-full mb-5" value={selected} onChange={e=>setSelected(e.target.value)}>
            <option value="">-- 請選擇學校 --</option>
            <optgroup label="國立大學">
              {schools.filter(s=>s.type==='public').map(s=><option key={s.id} value={s.id}>{s.name} ({s.acronym})</option>)}
            </optgroup>
            <optgroup label="私立大學">
              {schools.filter(s=>s.type==='private').map(s=><option key={s.id} value={s.id}>{s.name} ({s.acronym})</option>)}
            </optgroup>
          </select>
          {selected?(
            <div>
              <div className="mb-4">
                <div className="text-xl font-serif">{schoolName(selected)}</div>
                <div className="text-sm" style={{color:'var(--text2)'}}>{schools.find(s=>s.id===selected)?.name_en}</div>
                <div className="mt-2">
                  <span className="badge" style={{background:schoolType(selected)==='public'?'rgba(67,56,202,0.1)':'rgba(225,29,72,0.1)',color:schoolType(selected)==='public'?'var(--accent)':'var(--accent2)'}}>{schoolType(selected)==='public'?'國立':'私立'}</span>
                </div>
              </div>
              <div className="stat-num text-3xl mb-4">{schoolEvents.length} <span className="text-base font-sans font-normal" style={{color:'var(--text2)'}}>場活動</span></div>
              <div style={{height:200}}><canvas ref={polarRef}></canvas></div>
              <h4 className="font-serif text-lg mt-5 mb-3">近期活動</h4>
              <div className="space-y-2">
                {schoolEvents.slice(-5).reverse().map(e=>(
                  <div key={e.id} className="text-sm p-3 rounded-lg" style={{background:'var(--elevated)'}}>
                    <div className="font-medium leading-snug">{e.title}</div>
                    <div className="flex gap-2 mt-1.5 items-center">
                      <span className="font-mono text-xs" style={{color:'var(--text2)'}}>{fmtDate(e.date)}</span>
                      <span className="badge text-xs" style={{background:`${catColor(e.category)}15`,color:catColor(e.category)}}>{catName(e.category)}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ):<div className="text-center py-12" style={{color:'var(--muted)'}}><div className="text-4xl mb-2" style={{fontFamily:'Instrument Serif'}}>請選擇學校</div><div className="text-sm">請從上方下拉選單選擇</div></div>}
        </div>

        <div className="lg:col-span-2">
          <div className="card p-6">
            <SectionHead title="跨校比較" sub="最多選擇 6 所學校進行比較"/>
            <div className="flex flex-wrap gap-1.5 mb-5">
              {schools.map(s=>(
                <button key={s.id} onClick={()=>toggleCompare(s.id)}
                  className="text-xs px-3 py-1.5 rounded-full font-medium transition-all"
                  style={{background:compSchools.includes(s.id)?'var(--accent)':'var(--elevated)',color:compSchools.includes(s.id)?'#fff':'var(--text2)',border:'1px solid '+(compSchools.includes(s.id)?'var(--accent)':'var(--border)'),cursor:'pointer'}}>
                  {s.acronym}
                </button>
              ))}
            </div>
            <div style={{height:400}}><canvas ref={barCompRef}></canvas></div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ════════════ TAB 5: ADMIN ════════════
function AdminTab(){
  const year=useYear();
  const evts=useMemo(()=>filterEvts(year),[year]);

  const exportXLSX=useCallback(()=>{
    const rows=[['ID','School','School_EN','AcademicYear','Category','Category_Name','Title','Date','Unit','URL','Confidence']];
    evts.forEach(e=>{rows.push([e.id,e.school_name,schools.find(s=>s.id===e.school_id)?.name_en||'',e.academic_year||'',e.category,catName(e.category),e.title,e.date,e.unit,e.url||'',e.confidence]);});
    const ws=XLSX.utils.aoa_to_sheet(rows);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Events');
    XLSX.writeFile(wb,`hei-events-${year==='all'?'all':year}-export.xlsx`);
  },[evts,year]);

  const exportJSON=useCallback(()=>{
    const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='hei-events-data.json';a.click();
    URL.revokeObjectURL(url);

          ].map(({label,value,color})=>(
            <div key={label} className="p-4 rounded-xl" style={{background:'var(--elevated)'}}>
              <div className="text-xs font-medium mb-2" style={{color:'var(--text2)'}}>{label}</div>
              <div className="text-2xl font-mono font-semibold" style={{color}}>{value}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="card p-6 mb-6">
        <SectionHead title="爬取狀態"/>

                <span className="text-sm flex-1 truncate font-medium">{s.name}</span>

              </div>
            );
          })}

      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

                <div key={y} className="flex items-center gap-3">
                  <span className="font-mono text-xs font-medium" style={{color:'var(--text2)',width:28}}>{y}</span>
                  <div className="flex-1 h-2 rounded-full overflow-hidden" style={{background:'var(--border)'}}>
                    <div className="h-2 rounded-full" style={{width:`${Math.max(2,count/events.length*100)}%`,background:'var(--accent)'}}></div>
                  </div>
                  <span className="font-mono text-xs font-semibold" style={{color:'var(--accent)',width:28,textAlign:'right'}}>{count}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="p-4 rounded-xl" style={{background:'var(--elevated)'}}>
            <div className="font-serif text-lg mb-2">資料新鮮度</div>
            <div className="text-sm" style={{color:'var(--text2)'}}>最後爬取：<span className="font-mono">{meta.crawl_date}</span></div>
            <div className="text-sm" style={{color:'var(--text2)'}}>覆蓋率：<span className="font-mono">{schools.length}/{schools.length}</span> 所學校</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ════════════ MAIN APP ════════════
function App(){
  const[theme,toggleTheme]=useTheme();
  const[tab,setTab]=useState(0);
  const[yearFilter,setYearFilter]=useState('all');
  const tabs=['總覽','活動瀏覽','分析','學校資料','管理'];
  const availableYears=(meta.academic_years||['114']);

  return(
    <YearCtx.Provider value={yearFilter}>
    <div className="min-h-screen" style={{background:'var(--base)'}}>
      {/* Header */}
      <header className="sticky top-0 z-50 px-6 py-4" style={{background:'var(--card)',borderBottom:'1px solid var(--border)',boxShadow:'0 1px 3px var(--shadow)'}}>
        <div className="max-w-7xl mx-auto flex items-center justify-between">
          <div className="flex items-center gap-4">
            <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{background:'var(--accent)',color:'#fff',fontFamily:'Instrument Serif',fontSize:22}}>E</div>
            <div>
              <h1 className="font-serif text-xl" style={{lineHeight:1.2,letterSpacing:'-0.02em'}}>高教活動觀測站</h1>
              <p className="text-xs" style={{color:'var(--text2)'}}>台灣高等教育活動情報儀表板 · {meta.date_range.start.slice(0,4)}–{meta.date_range.end.slice(0,4)}</p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <span className="font-mono text-xs" style={{color:'var(--muted)'}}>v{meta.version}</span>
            <button onClick={toggleTheme} className="w-9 h-9 rounded-full flex items-center justify-center transition-all" style={{background:'var(--elevated)',border:'1px solid var(--border)',cursor:'pointer',fontSize:16}} aria-label="Toggle theme">
              {theme==='dark'?'\u2600\uFE0F':'\uD83C\uDF19'}
            </button>
          </div>
        </div>
      </header>

      {/* Tab bar + Year filter */}
      <nav className="px-6 py-3" style={{background:'var(--card)',borderBottom:'1px solid var(--border)'}}>
        <div className="max-w-7xl mx-auto flex items-center gap-2 overflow-x-auto" style={{scrollbarWidth:'none'}}>
          {tabs.map((t,i)=>(
            <button key={t} onClick={()=>setTab(i)} className={`tab-pill ${i===tab?'active':''}`}>
              {t}
            </button>
          ))}
          <div className="ml-auto flex-shrink-0 flex items-center gap-2">
            <span className="text-xs font-medium" style={{color:'var(--text2)',whiteSpace:'nowrap'}}>學年度</span>
            <select value={yearFilter} onChange={e=>setYearFilter(e.target.value)} style={{fontSize:13,padding:'5px 8px',borderRadius:8,minWidth:90}}>
              <option value="all">全部</option>
              {[...availableYears].reverse().map(y=><option key={y} value={y}>{y} 學年</option>)}
            </select>
          </div>
        </div>
      </nav>

      {/* Content */}
      <main className="max-w-7xl mx-auto px-6 py-8">
        {tab===0&&<OverviewTab/>}
        {tab===1&&<EventBrowserTab/>}
        {tab===2&&<AnalysisTab/>}
        {tab===3&&<SchoolProfileTab/>}
        {tab===4&&<AdminTab/>}
      </main>

      {/* Footer */}
      <footer className="text-center py-6 text-sm" style={{color:'var(--muted)',borderTop:'1px solid var(--border)'}}>
        <span style={{fontFamily:'Instrument Serif',fontSize:16}}>HEI Event Observatory</span>
        <span className="mx-2">&middot;</span>
        <span className="font-mono text-xs">{meta.crawl_date}</span>
        <span className="mx-2">&middot;</span>
        {events.length} events · {meta.schools_crawled} schools · {availableYears.length} academic years
      </footer>
    </div>
    </YearCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
